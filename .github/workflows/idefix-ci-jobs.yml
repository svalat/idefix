on:
  workflow_call:
    inputs:
      TESTME_OPTIONS:
        required: true
        type: string
      IDEFIX_COMPILER:
        required: true
        type: string

# concurrency:
#   # auto-cancel any concurrent job *in the same context*
#   # see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
#   # see https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

env:
  IDEFIX_COMPILER: ${{ inputs.IDEFIX_COMPILER }}
  TESTME_OPTIONS: ${{ inputs.TESTME_OPTIONS }}
  PYTHONPATH: ${{ github.workspace }}
  IDEFIX_DIR: ${{ github.workspace }}

permissions: {}

jobs:
  ShocksHydro:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Sod test
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/sod $TESTME_OPTIONS
      - name: Isothermal Sod test
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/sod-iso $TESTME_OPTIONS
      - name: Mach reflection test
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/MachReflection $TESTME_OPTIONS
      - name: Sedov blast wave
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/SedovBlastWave $TESTME_OPTIONS

  ParabolicHydro:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Viscous flow past cylinder
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/ViscousFlowPastCylinder $TESTME_OPTIONS
      - name: Viscous disk
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/ViscousDisk $TESTME_OPTIONS
      - name: Thermal diffusion
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/thermalDiffusion $TESTME_OPTIONS

  ShocksMHD:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: MHD Sod test
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/sod $TESTME_OPTIONS
      - name: MHD Isothermal Sod test
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/sod-iso $TESTME_OPTIONS
      - name: Orszag Tang
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/OrszagTang $TESTME_OPTIONS
      - name: Orszag Tang 3D
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/OrszagTang3D $TESTME_OPTIONS
      - name: Linear wave test
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/LinearWaveTest $TESTME_OPTIONS
      - name: Axis Flux tube
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/AxisFluxTube $TESTME_OPTIONS

  ParabolicMHD:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Ambipolar C Shock
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/AmbipolarCshock $TESTME_OPTIONS
      - name: Ambipolar C Shock 3D
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/AmbipolarCshock3D $TESTME_OPTIONS
      - name: Resistive Alfvén wave
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/ResistiveAlfvenWave $TESTME_OPTIONS
      - name: Grid coarsening diffusion
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/Coarsening $TESTME_OPTIONS
      - name: Hall whistler waves
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/HallWhistler $TESTME_OPTIONS

  Fargo:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Fargo + planet
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/FargoPlanet $TESTME_OPTIONS
      - name: Fargo MHD spherical
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/FargoMHDSpherical $TESTME_OPTIONS

  ShearingBox:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Hydro shearing box
        run: ./test.py -subdir $IDEFIX_DIR/test/HD/ShearingBox $TESTME_OPTIONS
      - name: MHD shearing box
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/ShearingBox $TESTME_OPTIONS

  SelfGravity:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Jeans Instability
        run: ./test.py -subdir $IDEFIX_DIR/test/SelfGravity/JeansInstability $TESTME_OPTIONS
      - name: Random sphere spherical
        run: ./test.py -subdir $IDEFIX_DIR/test/SelfGravity/RandomSphere $TESTME_OPTIONS
      - name: Random sphere cartesian
        run: ./test.py -subdir $IDEFIX_DIR/test/SelfGravity/RandomSphereCartesian $TESTME_OPTIONS
      - name: Uniform spherical collapse
        run: ./test.py -subdir $IDEFIX_DIR/test/SelfGravity/UniformCollapse $TESTME_OPTIONS
      - name: Dusty spherical collapse
        run: ./test.py -subdir $IDEFIX_DIR/test/SelfGravity/DustyCollapse $TESTME_OPTIONS

  Planet:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: 3 body
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/Planet3Body $TESTME_OPTIONS
      - name: migration
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/PlanetMigration2D $TESTME_OPTIONS
      - name: planet-planet
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/PlanetPlanetRK42D $TESTME_OPTIONS
      - name: spiral wake
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/PlanetSpiral2D $TESTME_OPTIONS
      - name: torques
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/PlanetTorque3D $TESTME_OPTIONS
      - name: RK5
        run: ./test.py -subdir $IDEFIX_DIR/test/Planet/PlanetsIsActiveRK52D $TESTME_OPTIONS

  Dust:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Energy conservation
        run: ./test.py -subdir $IDEFIX_DIR/test/Dust/DustEnergy $TESTME_OPTIONS
      - name: Dusty wave
        run: ./test.py -subdir $IDEFIX_DIR/test/Dust/DustyWave $TESTME_OPTIONS

  Braginskii:
    needs: [ShocksHydro, ParabolicHydro, ShocksMHD, ParabolicMHD]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: MTI
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/MTI $TESTME_OPTIONS
      - name: Spherical anisotropic diffusion
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/sphBragTDiffusion $TESTME_OPTIONS
      - name: Spherical anisotropic viscosity
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/sphBragViscosity $TESTME_OPTIONS
      - name: Collisionless thermal conduction
        run: ./test.py -subdir $IDEFIX_DIR/test/MHD/clessTDiffusion $TESTME_OPTIONS

  Examples:
    needs: [Fargo, Dust, Planet, ShearingBox, SelfGravity]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Run examples test
        run: cd test && ./checks_examples.sh $TEST_OPTIONS

  Utils:
    needs: [Fargo, Dust, Planet, ShearingBox, SelfGravity]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Lookup table
        run: ./test.py -subdir $IDEFIX_DIR/test/utils/lookupTable $TESTME_OPTIONS
      - name: Dump Image
        run: ./test.py -subdir $IDEFIX_DIR/test/utils/dumpImage $TESTME_OPTIONS
      - name: Column density
        run: ./test.py -subdir $IDEFIX_DIR/test/utils/columnDensity $TESTME_OPTIONS

  IOs:
    needs: [Fargo, Dust, Planet, ShearingBox, SelfGravity]
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: recursive
          persist-credentials: false
      - name: Restart dumps
        run: ./test.py -subdir $IDEFIX_DIR/test/IO/dump $TESTME_OPTIONS
      - name: Pydefix
        run: |
          python3 -m venv $IDEFIX_DIR/test/IO/pydefix/env
          source $IDEFIX_DIR/test/IO/pydefix/env/bin/activate
          python3 -m pip install -r $IDEFIX_DIR/test/IO/pydefix/python_requirements.txt
          ./test.py -subdir $IDEFIX_DIR/test/IO/pydefix $TESTME_OPTIONS

      - name: xdmf
        run: ./test.py -subdir $IDEFIX_DIR/test/IO/xdmf $TESTME_OPTIONS
